<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャットテスト</title>

    <style>
        /* カスタムチャットボタン（コンテナ: 透明、縦並びレイアウト） */
        #custom-chat-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            cursor: pointer;
            z-index: 9999;
            border: none;
            background: transparent;
            padding: 0;

            display: flex;
            max-width: 142px;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            gap: 11px;
        }

        /* 吹き出し本体 */
        .chat-callout {
            position: relative;
            padding: 8px 14px;
            border-radius: 20px;
            border: 2px solid #D6334E;
            background: #FAE6E9;
            box-shadow: 0 8px 24px -3px rgba(38, 38, 38, 0.16);
            font-size: 13px;
            font-weight: 600;
            color: #D6334E;
            white-space: nowrap;
            line-height: 1.4;
        }

        /* 吹き出しの尻尾（外側: ボーダー色） */
        .chat-callout::after {
            content: '';
            position: absolute;
            bottom: -11px;
            right: 20px;
            width: 0;
            height: 0;
            border-left: 9px solid transparent;
            border-right: 0 solid transparent;
            border-top: 11px solid #D6334E;
        }

        /* 吹き出しの尻尾（内側: 背景色で重ねてボーダーを再現） */
        .chat-callout::before {
            content: '';
            position: absolute;
            bottom: -7px;
            right: 21px;
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 0 solid transparent;
            border-top: 9px solid #FAE6E9;
            z-index: 1;
        }

        .icon-clip {
            animation: float 1.8s ease-in-out infinite;
            animation-play-state: paused;
        }

        #custom-chat-btn:hover .icon-clip {
            animation-play-state: running;
        }

        .icon-img {
            width: 86px;
            height: 86px;
            object-fit: contain;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-10px); }
        }

        /* === 初期メニューパネル === */
        #initial-menu-panel {
            display: none;
            position: fixed;
            bottom: 0;
            right: 24px;
            width: 375px;
            max-height: 90vh;
            flex-direction: column;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 32px rgba(0, 0, 0, 0.18);
            z-index: 9998;
            overflow: hidden;
        }

        .imenu-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            height: 48px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #D6334E 0%, #CC0022 100%);
        }

        .imenu-header-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            transition: background 0.15s;
        }
        .imenu-header-btn:hover { background: rgba(255,255,255,0.18); }

        .imenu-header-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            flex: 1;
            text-align: center;
        }

        .imenu-header-minimize-line {
            display: block;
            width: 16px;
            height: 2px;
            background: #fff;
            border-radius: 1px;
            transform: translateY(4px);
            pointer-events: none;
        }

        .imenu-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 20px 28px;
            background: #fff;
            overflow-y: auto;
            flex: 1;
        }

        .imenu-mascot {
            width: 100px;
            height: auto;
            margin-bottom: 16px;
            object-fit: contain;
        }

        .imenu-title {
            margin: 0 0 8px;
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            text-align: center;
        }

        .imenu-subtitle {
            margin: 0 0 24px;
            font-size: 13px;
            color: #555;
            text-align: center;
            line-height: 1.6;
        }

        .imenu-list {
            list-style: none;
            margin: 0;
            padding: 0;
            width: 100%;
            max-width: 335px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .imenu-item {
            width: 100%;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 16px;
            box-sizing: border-box;
            background: #F0F0F0;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .imenu-item:hover { opacity: 0.8; }

        .imenu-item-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .imenu-item-icon svg { display: block; }

        .imenu-item-label {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            text-align: left;
        }

        .imenu-item-arrow {
            color: #869199;
            font-size: 18px;
            flex-shrink: 0;
            line-height: 1;
        }

        /* 最大化: chatMaximizeToggle と同じ方式でチャット枠を拡大 */
        body.chat-maximized .embeddedMessagingFrame,
        body.chat-maximized .embeddedServiceSidebar,
        body.chat-maximized [class*="embeddedMessaging"]:not(.embeddedMessagingTopContainer),
        body.chat-maximized embedded-messaging,
        body.chat-maximized embedded-service-portal,
        body.chat-maximized #embeddedMessagingFrame,
        body.chat-maximized #embedded-messaging,
        body.chat-maximized iframe[name*="embeddedMessaging"],
        body.chat-maximized iframe[title*="チャット"],
        body.chat-maximized iframe[title*="Messaging"] {
            position: fixed !important;
            top: auto !important;
            left: 50% !important;
            right: auto !important;
            bottom: 0 !important;
            transform: translateX(-50%) !important;
            width: 870px !important;
            height: 976px !important;
            max-width: 92vw !important;
            max-height: 92vh !important;
            z-index: 9999 !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2) !important;
        }

        /* 最大化ボタン */
        #maximize-toggle-btn {
            position: fixed;
            display: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            background: transparent;
            cursor: pointer;
            z-index: 999999;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.15s ease;
        }
        #maximize-toggle-btn:hover {
            background: rgba(0, 0, 0, 0.08);
        }
        #maximize-toggle-btn svg {
            width: 18px;
            height: 18px;
            pointer-events: none;
        }

        /* 最小化: chatMaximizeToggle と同じ方式でチャット枠を非表示 */
        body.chat-minimized .embeddedMessagingFrame,
        body.chat-minimized .embeddedServiceSidebar,
        body.chat-minimized [class*="embeddedMessaging"]:not(.embeddedMessagingTopContainer),
        body.chat-minimized embedded-messaging,
        body.chat-minimized embedded-service-portal,
        body.chat-minimized #embeddedMessagingFrame,
        body.chat-minimized #embedded-messaging,
        body.chat-minimized iframe[name*="embeddedMessaging"],
        body.chat-minimized iframe[title*="チャット"],
        body.chat-minimized iframe[title*="Messaging"] {
            display: none !important;
        }
    </style>

    <!-- ECv2イベントリスナー -->
    <script>
        let chatReady = false;
        let isMinimized = false;
        let isMaximized = false;

        window.addEventListener("onEmbeddedMessagingReady", () => {
            embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
                "currentURL": window.location.href
            });
        });

        // launchChat() はこのイベント後でないと呼べない
        window.addEventListener("onEmbeddedMessagingButtonCreated", () => {
            chatReady = true;
            embeddedservice_bootstrap.utilAPI.hideChatButton();
        });

        // ECv2標準UIで最小化/終了した場合（カスタムヘッダー経由では通常発火しない）
        window.addEventListener("onEmbeddedMessagingWindowMinimized", () => {
            isMinimized = true;
            document.body.classList.add('chat-minimized');
            document.getElementById('custom-chat-btn').style.display = 'block';
        });
        window.addEventListener("onEmbeddedMessagingConversationClosed", () => {
            isMinimized = false;
            document.body.classList.remove('chat-minimized');
            document.getElementById('custom-chat-btn').style.display = 'block';
        });

        // カスタムヘッダーLWCからのpostMessageを受信
        window.addEventListener('message', (event) => {
            if (!event.data || typeof event.data !== 'object') return;
            if (event.data.type === 'chat-minimize') {
                // chatMaximizeToggle と同方式: body クラスで CSS 切替
                isMinimized = true;
                document.body.classList.add('chat-minimized');
                document.getElementById('custom-chat-btn').style.display = 'block';
                document.getElementById('maximize-toggle-btn').style.display = 'none';
            } else if (event.data.type === 'chat-end-conversation') {
                // LWC 側でストレージクリア済み → ページリロードでクリーンな状態に
                window.location.reload();
            }
        });
    </script>
</head>
<body>

                        <span class="imenu-item-label">事故・保険金請求のご連絡</span>

                </li>
                <li>
                    <button class="imenu-item" onclick="selectMenuOption('ご意見・ご要望')">
                        <span class="imenu-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D6334E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>

    </div>

    <!-- 最大化トグルボタン（chatMaximizeToggle LWC の機能を移植） -->
    <button id="maximize-toggle-btn" onclick="toggleMaximize()" title="最大化" aria-label="最大化">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
            <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>

    <!-- カスタムチャットボタン -->
    <button id="custom-chat-btn" onclick="openChat()" title="チャットを開く">
        <div class="chat-callout">何かお困りですか？</div>
        <div class="icon-clip">
            <img src="ChatbotIcon_trim.png" class="icon-img" alt="チャットを開く">
        </div>
    </button>

    <!-- ECv2スニペット -->
    <script type='text/javascript'>
        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'en_US';
                embeddedservice_bootstrap.settings.hideChatButtonOnLoad = true;

                embeddedservice_bootstrap.init(
                    '00DIl000000H31Y',
                    'SF_V1',
                    'https://d5h00000141dheay--agent0507.sandbox.my.site.com/ESWSFV11783329435238',
                    {
                        scrt2URL: 'https://d5h00000141dheay--agent0507.sandbox.my.salesforce-scrt.com'
                    }
                );
            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        };
    </script>
    <script type='text/javascript' src='https://d5h00000141dheay--agent0507.sandbox.my.site.com/ESWSFV11783329435238/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

    <script>
        function openChat() {
            // 最小化中はチャットを再起動せず、フレームを再表示するだけ
            if (isMinimized) {
                isMinimized = false;
                document.body.classList.remove('chat-minimized');
                document.getElementById('custom-chat-btn').style.display = 'none';
                return;
            }
            if (!chatReady) {
                alert('チャットがまだ準備中です。少し待ってから再クリックしてください。');
                return;
            }
            // 初期メニューパネルを表示（ECv2 は起動しない）
            document.getElementById('initial-menu-panel').style.display = 'flex';
            document.getElementById('custom-chat-btn').style.display = 'none';
        }

        // メニュー選択 → 選択値を prechat フィールドに設定して ECv2 起動
        function selectMenuOption(label) {
            document.getElementById('initial-menu-panel').style.display = 'none';
            try {
                embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
                    currentURL: window.location.href,
                    selectedMenu: label
                });
            } catch (e) {}
            embeddedservice_bootstrap.utilAPI.launchChat()
                .catch(() => console.error('チャット起動失敗'));
        }

        // ×/— ボタン → メニューを閉じてピンクボタンを戻す
        function closeMenuPanel() {
            document.getElementById('initial-menu-panel').style.display = 'none';
            document.getElementById('custom-chat-btn').style.display = 'flex';
        }
    </script>

    <!-- 最大化トグル: chatMaximizeToggle LWC の JS ロジックを移植 -->
    <script>
        const CHAT_WINDOW_SELECTORS = [
            '.embeddedMessagingFrame',
            '.embeddedServiceSidebar',
            '[class*="embeddedMessaging"]',
            'embedded-messaging',
            'embedded-service-portal',
            '#embeddedMessagingFrame',
            '#embedded-messaging',
            'iframe[name*="embeddedMessaging"]',
            'iframe[title*="チャット"]',
            'iframe[title*="Messaging"]'
        ];

        function findChatWindow() {
            for (const sel of CHAT_WINDOW_SELECTORS) {
                try {
                    const el = document.querySelector(sel);
                    if (el) return el;
                } catch (e) {}
            }
            return null;
        }

        function isChatVisible(el) {
            if (!el) return false;
            try {
                const rect = el.getBoundingClientRect();
                if (rect.width < 50 || rect.height < 100) return false;
                const style = window.getComputedStyle(el);
                return style.display !== 'none' && style.visibility !== 'hidden' && parseFloat(style.opacity || '1') >= 0.1;
            } catch (e) {
                return false;
            }
        }

        function repositionMaximizeButton(chatEl) {
            const btn = document.getElementById('maximize-toggle-btn');
            if (!btn || !chatEl) return;
            try {
                const rect = chatEl.getBoundingClientRect();
                // chatMaximizeToggle と同じ計算: header 中心 (top+12), right edge (windowWidth - right + 88)
                const top = Math.max(rect.top + 12, 4);
                const right = Math.max(window.innerWidth - rect.right + 88, 4);
                btn.style.top = top + 'px';
                btn.style.right = right + 'px';
                btn.style.left = 'auto';
            } catch (e) {}
        }

        function updateMaximizeButton() {
            if (isMinimized) return;
            const btn = document.getElementById('maximize-toggle-btn');
            if (!btn) return;
            const chatEl = findChatWindow();
            const visible = isChatVisible(chatEl);
            if (visible && chatEl) {
                btn.style.display = 'flex';
                repositionMaximizeButton(chatEl);
            } else {
                btn.style.display = 'none';
            }
        }

        function toggleMaximize() {
            isMaximized = !isMaximized;
            const btn = document.getElementById('maximize-toggle-btn');
            if (isMaximized) {
                document.body.classList.add('chat-maximized');
                if (btn) btn.title = '通常サイズに戻す';
            } else {
                document.body.classList.remove('chat-maximized');
                if (btn) btn.title = '最大化';
            }
            // サイズ変更後にボタン位置を再計算
            setTimeout(updateMaximizeButton, 50);
        }

        // ポーリング + MutationObserver でチャット開閉を監視（chatMaximizeToggle と同方式）
        setInterval(updateMaximizeButton, 300);
        window.addEventListener('resize', updateMaximizeButton);
        window.addEventListener('scroll', updateMaximizeButton, true);
    </script>
</body>
