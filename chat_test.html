<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャットテスト</title>

    <style>
        /* カスタムチャットボタン */
        #custom-chat-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            z-index: 9999;
        }

        .icon-clip {
            animation: float 1.8s ease-in-out infinite;
            animation-play-state: paused;
        }

        #custom-chat-btn:hover .icon-clip {
            animation-play-state: running;
        }

        .icon-img {
            width: 86px;
            height: 86px;
            object-fit: contain;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-10px); }
        }

        /* 最小化: chatMaximizeToggle と同じ方式でチャット枠を非表示 */
        body.chat-minimized .embeddedMessagingFrame,
        body.chat-minimized .embeddedServiceSidebar,
        body.chat-minimized [class*="embeddedMessaging"]:not(.embeddedMessagingTopContainer),
        body.chat-minimized embedded-messaging,
        body.chat-minimized embedded-service-portal,
        body.chat-minimized #embeddedMessagingFrame,
        body.chat-minimized #embedded-messaging,
        body.chat-minimized iframe[name*="embeddedMessaging"],
        body.chat-minimized iframe[title*="チャット"],
        body.chat-minimized iframe[title*="Messaging"] {
            display: none !important;
        }
    </style>

    <!-- ECv2イベントリスナー -->
    <script>
        let chatReady = false;
        let isMinimized = false;

        window.addEventListener("onEmbeddedMessagingReady", () => {
            embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
                "currentURL": window.location.href
            });
        });

        // launchChat() はこのイベント後でないと呼べない
        window.addEventListener("onEmbeddedMessagingButtonCreated", () => {
            chatReady = true;
            embeddedservice_bootstrap.utilAPI.hideChatButton();
        });

        // ECv2標準UIで最小化/終了した場合（カスタムヘッダー経由では通常発火しない）
        window.addEventListener("onEmbeddedMessagingWindowMinimized", () => {
            isMinimized = true;
            document.body.classList.add('chat-minimized');
            document.getElementById('custom-chat-btn').style.display = 'block';
        });
        window.addEventListener("onEmbeddedMessagingConversationClosed", () => {
            isMinimized = false;
            document.body.classList.remove('chat-minimized');
            document.getElementById('custom-chat-btn').style.display = 'block';
        });

        // カスタムヘッダーLWCからのpostMessageを受信
        window.addEventListener('message', (event) => {
            if (!event.data || typeof event.data !== 'object') return;
            if (event.data.type === 'chat-minimize') {
                // chatMaximizeToggle と同方式: body クラスで CSS 切替
                isMinimized = true;
                document.body.classList.add('chat-minimized');
                document.getElementById('custom-chat-btn').style.display = 'block';
            } else if (event.data.type === 'chat-end-conversation') {
                // LWC 側でストレージクリア済み → ページリロードでクリーンな状態に
                window.location.reload();
            }
        });
    </script>
</head>
<body>
    <h1>チャットテストページ</h1>
    <p>右下のアイコンをクリックするとチャットが開きます。</p>

    <!-- カスタムチャットボタン -->
    <button id="custom-chat-btn" onclick="openChat()" title="チャットを開く">
        <div class="icon-clip">
            <img src="ChatbotIcon_trim.png" class="icon-img" alt="チャットを開く">
        </div>
    </button>

    <!-- ECv2スニペット -->
    <script type='text/javascript'>
        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'en_US';
                embeddedservice_bootstrap.settings.hideChatButtonOnLoad = true;

                embeddedservice_bootstrap.init(
                    '00DIl000000H31Y',
                    'SF_V1',
                    'https://d5h00000141dheay--agent0507.sandbox.my.site.com/ESWSFV11783329435238',
                    {
                        scrt2URL: 'https://d5h00000141dheay--agent0507.sandbox.my.salesforce-scrt.com'
                    }
                );
            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        };
    </script>
    <script type='text/javascript' src='https://d5h00000141dheay--agent0507.sandbox.my.site.com/ESWSFV11783329435238/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

    <script>
        function openChat() {
            // 最小化中はチャットを再起動せず、フレームを再表示するだけ
            if (isMinimized) {
                isMinimized = false;
                document.body.classList.remove('chat-minimized');
                document.getElementById('custom-chat-btn').style.display = 'none';
                return;
            }
            if (!chatReady) {
                alert('チャットがまだ準備中です。少し待ってから再クリックしてください。');
                return;
            }
            embeddedservice_bootstrap.utilAPI.launchChat()
                .then(() => {
                    document.getElementById('custom-chat-btn').style.display = 'none';
                })
                .catch(() => {
                    console.error('チャット起動失敗');
                });
        }
    </script>
</body>
</html>
